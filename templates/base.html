<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <title>{% block title %}{% endblock %}</title>
  <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
        background-color: #1b581e;
        border-bottom: 1px solid #ddd;
    }
    header .logo a {
      text-decoration: none;
      font-size: 22px;
      font-width: bold;
      color: #fcff67;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }
    nav ul li a {
      text-decoration: none;
      color: #fcff67;
      font-size: 18px;
      transition: color 0.3s;
    }
    nav ul li a:hover {
      color: #007bff;
    }
    .container {
      max-width: 1200px;
      margin: auto;
      padding: 20px;
    }
    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    @media (font-size: 768px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }
      nav ul {
        flex-direction: column;
        gap: 10px;
      }
      nav ul li a {
        font-size: 16px;
      }
    }

    @media (font-size: 480px) {
      header .logo a {
        font-size: 18px;
      }
      nav ul li a {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="{{ url_for('index') }}">Головна сторінка</a></li>
        <li><a href="{{ url_for('menu') }}">Меню</a></li>
        <li><a href="{{ url_for('reviews') }}">Відгуки</a></li>
      </ul>
    </nav>
  </header>
    
  <div class="container">
    {% block body %}{% endblock %}
</body>
</html>
